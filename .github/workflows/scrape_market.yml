name: Scrape NEPSE Market CSV

on:
  workflow_dispatch:
  repository_dispatch:
    types: [scrape-market-command]
  schedule:
    - cron: "15,45 5-8 * * 0-4"
    - cron: "15 9 * * 0-4"

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape-market:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run market scraper
        run: python -m scraper.cli market

      - name: Prepare daily PR metadata (NPT)
        run: |
          echo "NPT_DATE=$(TZ=Asia/Kathmandu date +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "NPT_TIME=$(TZ=Asia/Kathmandu date +'%Y-%m-%d %H:%M NPT')" >> "$GITHUB_ENV"
          echo "BRANCH_NAME=auto/market-data-$(TZ=Asia/Kathmandu date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Create or update daily market data PR
        uses: peter-evans/create-pull-request@v7
        with:
          base: dev
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          title: "Market data updates for ${{ env.NPT_DATE }} (NPT)"
          commit-message: "Update market data (${{ env.NPT_TIME }})"
          body: |
            Automated market data updates for **${{ env.NPT_DATE }} (NPT)**.

            - Source: scheduled workflow
            - Frequency: every 30 minutes during market window
            - Files: `data/nepse/market_summary_timeseries.csv`, `data/nepse/today_price_timeseries.csv`

            This PR is updated throughout the day and can be merged once ready.
          add-paths: |
            data/nepse/market_summary_timeseries.csv
            data/nepse/today_price_timeseries.csv

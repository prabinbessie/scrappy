name: Scrape NEPSE Market CSV

on:
  workflow_dispatch:
  repository_dispatch:
    types: [scrape-market-command]

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape-market:
    runs-on: ubuntu-latest
    env:
      HAS_CHANGES: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare daily PR metadata (NPT)
        run: |
          echo "NPT_DATE=$(TZ=Asia/Kathmandu date +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "NPT_TIME=$(TZ=Asia/Kathmandu date +'%Y-%m-%d %H:%M NPT')" >> "$GITHUB_ENV"
          echo "BRANCH_NAME=auto/market-data-$(TZ=Asia/Kathmandu date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create or switch to daily branch
        run: |
          if git ls-remote --exit-code --heads origin "${BRANCH_NAME}"; then
            git fetch origin "${BRANCH_NAME}"
            git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"
          else
            git fetch origin dev
            git checkout -B "${BRANCH_NAME}" "origin/dev"
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run market scraper
        run: python -m scraper.cli market

      - name: Commit and push market data
        run: |
          git add data/nepse/market_summary_timeseries.csv data/nepse/today_price_timeseries.csv
          if git diff --cached --quiet; then
            echo "No market data changes to commit"
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
            exit 0
          fi

          git commit -m "Update market data (${NPT_TIME})"
          git push origin "${BRANCH_NAME}"
          echo "HAS_CHANGES=true" >> "$GITHUB_ENV"

      - name: Create daily PR if missing
        if: env.HAS_CHANGES == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const head = `${context.repo.owner}:${process.env.BRANCH_NAME}`;
            const base = 'dev';
            const openPrs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head,
              base,
            });

            if (openPrs.data.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Market data updates for ${process.env.NPT_DATE} (NPT)`,
                head: process.env.BRANCH_NAME,
                base,
                body: [
                  `Automated market data updates for **${process.env.NPT_DATE} (NPT)**.`,
                  '',
                  '- Source: external cron + workflow_dispatch',
                  '- Frequency: every 30 minutes during market window',
                  '- Files: `data/nepse/market_summary_timeseries.csv`, `data/nepse/today_price_timeseries.csv`',
                ].join('\n'),
              });
            }

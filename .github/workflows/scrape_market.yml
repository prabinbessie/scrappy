name: Scrape NEPSE Market CSV

on:
  workflow_dispatch:
  repository_dispatch:
    types: [scrape-market-command]

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape-market:
    runs-on: ubuntu-latest
    env:
      HAS_CHANGES: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare daily PR metadata (NPT)
        run: |
          echo "NPT_DATE=$(TZ=Asia/Kathmandu date +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "NPT_TIME=$(TZ=Asia/Kathmandu date +'%Y-%m-%d %H:%M:%S NPT')" >> "$GITHUB_ENV"
          echo "NPT_YEAR=$(TZ=Asia/Kathmandu date +'%Y')" >> "$GITHUB_ENV"
          echo "NPT_MONTH=$(TZ=Asia/Kathmandu date +'%m')" >> "$GITHUB_ENV"
          echo "BRANCH_NAME=auto/market-data-$(TZ=Asia/Kathmandu date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create or switch to daily branch
        run: |
          git fetch origin dev
          if git ls-remote --exit-code --heads origin "${BRANCH_NAME}"; then
            git fetch origin "${BRANCH_NAME}"
            git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"
            git rebase "origin/dev"
          else
            git checkout -B "${BRANCH_NAME}" "origin/dev"
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Ensure NEPSE year/month directory exists
        run: mkdir -p "data/nepse/${NPT_YEAR}/${NPT_MONTH}"

      - name: Run market scraper
        run: python -m scraper.cli market

      - name: Commit and push market data
        run: |
          if [ -d data/nepse ]; then
            git add -A data/nepse
          fi
          if git diff --cached --quiet; then
            echo "No market data changes to commit"
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
            exit 0
          fi

          git commit -m "Update market data (${NPT_TIME}) [run:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}]"
          git push --force-with-lease origin "${BRANCH_NAME}"
          echo "HAS_CHANGES=true" >> "$GITHUB_ENV"

      - name: Create daily PR if missing
        if: env.HAS_CHANGES == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const head = `${context.repo.owner}:${process.env.BRANCH_NAME}`;
            const base = 'dev';
            const openPrs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head,
              base,
            });

            if (openPrs.data.length === 0) {
              const { data: pull } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Market data updates for ${process.env.NPT_DATE} (NPT)`,
                head: process.env.BRANCH_NAME,
                base,
                body: [
                  `Automated market data updates for **${process.env.NPT_DATE} (NPT)**.`,
                  '',
                  '- Source: external cron + workflow_dispatch',
                  '- Frequency: every 30 minutes during market window',
                  '- Files: `data/nepse/YYYY/MM/market_summary_YYYY-MM-DD.csv`, `data/nepse/YYYY/MM/today_price_YYYY-MM-DD.csv`',
                ].join('\n'),
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull.number,
                labels: ['auto-scraped']
              });
            }

name: Scrape IPO Feed JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  scrape-ipo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run IPO scraper
        run: python -m scraper.cli ipo

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/ipo/ipo_feed.json; then
            echo "Nothing new to commit"
            exit 0
          fi

          git add data/ipo/ipo_feed.json
          git commit -m "Update IPO data ($(TZ=Asia/Kathmandu date +'%Y-%m-%d %H:%M NPT'))"

          # Fetch and merge safely, avoiding restrictive rebase locks
          git fetch origin
          git pull --no-rebase origin $(git branch --show-current) -X ours --no-edit || true

          git push
